<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Desbravadores - Mobile OK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TESTE DO VERDE - SE O CARREGAMENTO ESTIVER VERDE, O SITE ATUALIZOU! */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #loading-overlay p { color: #00ff00 !important; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 0 10px #00ff00; }
        .spinner { width: 60px; height: 60px; border: 5px solid #111; border-top-color: #00ff00 !important; border-radius: 50%; animation: spin 0.8s linear infinite; box-shadow: 0 0 15px #00ff00; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* RESET E CORES */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        :root { 
            --amarelo: #ffcc00; 
            --vermelho: #e63946; 
            --preto: #000000; 
            --cinza-dark: #121212; 
            --cinza-card: #1e1e1e; 
            --borda-suave: #333333;
        }
        
        body { background-color: var(--cinza-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; line-height: 1.6; overflow-x: hidden; }
        
        /* HEADER PADRÃO (PC) */
        header { 
            width: 100%; height: 80px; position: fixed; top: 0; left: 0; z-index: 1000; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
            transition: all 0.4s ease; backdrop-filter: blur(10px); background: rgba(0,0,0,0.5);
        }
        header.scrolled { border-bottom: 3px solid var(--amarelo); background: rgba(0,0,0,0.9); }

        .logo-container { display: flex; align-items: center; cursor: pointer; }
        .header-logo { height: 55px; transition: 0.3s; }
        
        .nav-buttons { display: flex; align-items: center; gap: 15px; }
        .user-status { font-weight: 600; background: rgba(255, 255, 255, 0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 8px; }

        .btn-lideranca { background: linear-gradient(135deg, var(--vermelho), #9b1d26); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-custom { background: linear-gradient(135deg, #444, #222); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; align-items: center; gap: 8px; transition: 0.2s; }

        /* MOBILE MENU BUTTON (OCULTO NO PC) */
        .mobile-menu-btn { display: none; background: none; border: none; color: var(--amarelo); font-size: 1.8rem; cursor: pointer; z-index: 1100; }

        /* ========== RESPONSIVIDADE MOBILE AGRESSIVA ========== */
        @media (max-width: 768px) {
            header { height: 70px !important; padding: 0 15px !important; background: #000 !important; border-bottom: 2px solid var(--amarelo) !important; }
            .mobile-menu-btn { display: block !important; }
            
            /* ESCONDER BOTÕES NO MOBILE E MOSTRAR NO MENU */
            .nav-buttons { 
                position: fixed !important; top: 70px !important; left: 0 !important; width: 100% !important; 
                background: #000 !important; flex-direction: column !important; padding: 20px !important; 
                gap: 15px !important; transform: translateY(-150%) !important; transition: 0.4s ease !important;
                border-bottom: 3px solid var(--amarelo) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
                z-index: 999 !important;
            }
            .nav-buttons.active { transform: translateY(0) !important; }
            
            .user-status, .btn-lideranca, .btn-custom { width: 100% !important; justify-content: center !important; padding: 15px !important; font-size: 1.1rem !important; }
            .header-logo { height: 45px !important; }
            
            /* AJUSTES DE CONTEÚDO */
            .page { margin-top: 80px !important; padding: 15px !important; }
            .hero h1 { font-size: 1.8rem !important; }
            .hero p.subtitle { font-size: 1rem !important; }
            .timer { gap: 10px !important; }
            .unit-timer { min-width: 75px !important; padding: 10px !important; }
            .unit-timer b { font-size: 1.6rem !important; }
            
            .panel-layout { display: flex !important; flex-direction: column !important; }
            .sidebar, .main-content, .ranking-column { width: 100% !important; position: static !important; }
            .dbv-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
        }

        /* ESTILOS GERAIS (IGUAIS AO ORIGINAL) */
        .page { display: none; min-height: 90vh; padding: 100px 25px 25px; max-width: 1600px; margin: auto; }
        .active { display: block !important; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hero { text-align: center; margin-bottom: 40px; padding: 60px 20px; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px solid var(--borda-suave); }
        .hero h1 { font-size: 3.5rem; color: var(--amarelo); margin-bottom: 10px; }
        
        .timer { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .unit-timer { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; min-width: 100px; border: 2px solid var(--vermelho); }
        .unit-timer b { font-size: 2.5rem; display: block; }
        .unit-timer span { font-size: 0.8rem; color: var(--amarelo); text-transform: uppercase; }

        .home-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .gallery-card { background: var(--cinza-card); border-radius: 15px; overflow: hidden; border: 1px solid var(--borda-suave); }
        .gallery-media-container { height: 200px; background: #000; display: flex; align-items: center; justify-content: center; }
        .gallery-media-container img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-text-box { padding: 15px; text-align: center; }

        .dbv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .dbv-card { background: #111; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        
        footer { padding: 40px; text-align: center; background: #000; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body class="is-home">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p><i class="fa-solid fa-bolt"></i> ATUALIZANDO SISTEMA...</p>
    </div>

    <header id="main-header">
        <div class="logo-container" onclick="location.reload()">
            <img id="main-logo-img" src="PNGDBV.webp" class="header-logo" onerror="this.src='https://via.placeholder.com/100'">
        </div>

        <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>

        <div class="nav-buttons" id="nav-menu">
            <div class="user-status" id="status-txt"><i class="fa-solid fa-circle-notch fa-spin"></i> Conectando...</div>
            <button id="nav-custom" class="btn-custom" onclick="showPage('custom-page')"><i class="fa-solid fa-wand-magic-sparkles"></i> Customizar Site</button>
            <button id="nav-admin" class="btn-lideranca" onclick="abrirLogin()"><i class="fa-solid fa-lock"></i> Área do Líder</button>
        </div>
    </header>

    <section id="home-page" class="page active">
        <div class="hero">
            <h1 id="home-title-display">Portal Desbravadores</h1>
            <p id="home-subtitle-display" class="subtitle">Sistema de Gestão e Rankings</p>
            <div class="timer">
                <div class="unit-timer"><b id="t-d">00</b><span>Dias</span></div>
                <div class="unit-timer"><b id="t-h">00</b><span>Horas</span></div>
                <div class="unit-timer"><b id="t-m">00</b><span>Min</span></div>
                <div class="unit-timer"><b id="t-s">00</b><span>Seg</span></div>
            </div>
        </div>
        <div id="home-gallery-grid" class="home-gallery"></div>
    </section>

    <!-- PÁGINAS SIMPLIFICADAS PARA O TESTE -->
    <section id="custom-page" class="page">
        <div style="text-align:center; padding: 50px;">
            <h2>Painel de Customização</h2>
            <p>Clique no botão abaixo para voltar.</p>
            <button onclick="showPage('home-page')" class="btn-lideranca" style="margin: 20px auto;">Voltar para Home</button>
        </div>
    </section>

    <section id="admin-page" class="page">
        <div style="text-align:center; padding: 50px;">
            <h2>Painel Administrativo</h2>
            <p>Bem-vindo, <span id="user-name">Líder</span>!</p>
            <button onclick="showPage('home-page')" class="btn-lideranca" style="margin: 20px auto;">Voltar para Home</button>
        </div>
    </section>

    <footer>
        <p id="footer-text">© 2026 Portal Desbravadores - Mobile Optimized</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyBfmk3fKbRWy3HhcJ47qStH7VChI6U0tWM", 
            authDomain: "clube-guardioes.firebaseapp.com", 
            projectId: "clube-guardioes", 
            storageBucket: "clube-guardioes.firebasestorage.app", 
            messagingSenderId: "106491860016", 
            appId: "1:106491860016:web:bef77d52150c8e915d09f5" 
        };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const DOC_REF = db_fs.collection("sistema").doc("dados");

        let db_data = null;
        let currentUser = null;

        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
            const icon = document.querySelector('.mobile-menu-btn i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-menu').classList.remove('active');
            window.scrollTo(0,0);
        }

        async function carregarDados() {
            try {
                const snap = await DOC_REF.get();
                if(snap.exists) {
                    db_data = snap.data();
                    renderSite();
                }
            } catch(e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function renderSite() {
            if(!db_data) return;
            document.getElementById('home-title-display').innerText = db_data.home.title;
            document.getElementById('home-subtitle-display').innerText = db_data.home.subTitle;
            document.getElementById('footer-text').innerText = db_data.home.footer || "© 2026 Portal Desbravadores";
            
            // Renderizar Galeria Simples
            document.getElementById('home-gallery-grid').innerHTML = db_data.home.gallery.map(m => `
                <div class="gallery-card">
                    <div class="gallery-media-container">
                        <img src="${m.url}" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div class="gallery-text-box"><h3>${m.title || ''}</h3></div>
                </div>
            `).join('');
        }

        function abrirLogin() {
            const u = prompt("Usuário:");
            const p = prompt("Senha:");
            const found = db_data.usuarios.find(x => x.u === u && x.p === p);
            if(found) {
                currentUser = found;
                document.getElementById('status-txt').innerHTML = `<i class="fa-solid fa-user-check"></i> ${found.unid}`;
                document.getElementById('nav-custom').style.display = found.perms.h ? 'flex' : 'none';
                showPage('admin-page');
            } else { alert("Erro!"); }
        }

        // TIMER SIMPLES
        setInterval(() => {
            const diff = new Date("2026-12-31T23:59").getTime() - new Date().getTime();
            if(diff < 0) return;
            document.getElementById('t-d').innerText = Math.floor(diff / 86400000).toString().padStart(2,'0');
            document.getElementById('t-h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('t-m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('t-s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }, 1000);

        window.addEventListener('scroll', () => {
            if(window.scrollY > 50) document.getElementById('main-header').classList.add('scrolled');
            else document.getElementById('main-header').classList.remove('scrolled');
        });

        carregarDados();
    </script>
</body>
</html>
